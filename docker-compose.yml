services:
  thinkai-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thinkai-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - thinkai-voice-agent/.env
    volumes:
      - agent-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  agent-data:
