      <!-- [HTML-SECTION: page-calendar] START -- FullCalendar wrapper
           JS: initCalendar(), loadCalendarEvents() | CSS: calendar.css -->
      <div class="page" id="page-calendar">
        <!-- Accounty-style client scope tabs -->
        <div id="cal-scope-tabs" style="display:flex; border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:10px;">
          <button id="cal-scope-own" onclick="setCalendarScope('own')" style="flex:1; padding:12px 20px; border:none; background:var(--accent); color:#082432; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; font-family:'Inter',Arial,sans-serif;">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:16px;height:16px;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span style="margin-left:2px;">Saját ügyfeleim (<span id="cal-own-count">0</span>)</span>
          </button>
          <button id="cal-scope-all" onclick="setCalendarScope('all')" style="flex:1; padding:12px 20px; border:none; background:transparent; color:var(--text-muted); font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; font-family:'Inter',Arial,sans-serif;">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:16px;height:16px;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
            <span style="margin-left:2px;">Összes ügyfél (<span id="cal-all-count">0</span>)</span>
          </button>
        </div>
        <div class="page-header" style="display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:6px;">
          <div class="page-title" style="font-size:20px; margin:0;">Naptár</div>
          <div style="display:flex; gap:8px; align-items:center;">
            <!-- View toggle: List / Grid -->
            <div style="display:flex; background:var(--bg3, #f0f2f5); border-radius:10px; padding:3px; gap:2px;">
              <button id="cal-view-list-btn" onclick="switchCalendarView('list')" title="Lista nézet" style="background:transparent; border:none; border-radius:8px; padding:8px 10px; cursor:pointer; color:var(--text-muted); transition:all 0.2s; display:flex; align-items:center; justify-content:center;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
              </button>
              <button id="cal-view-grid-btn" onclick="switchCalendarView('grid')" title="Naptár nézet" style="background:rgba(28,238,224,0.12); border:none; border-radius:8px; padding:8px 10px; cursor:pointer; color:var(--accent, #1ceee0); transition:all 0.2s; display:flex; align-items:center; justify-content:center;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              </button>
            </div>
            <!-- New event button -->
            <button onclick="openNewEventModal()" style="display:flex; align-items:center; gap:6px; padding:8px 16px; font-size:13px; font-weight:600; white-space:nowrap; border-radius:10px; border:1px solid var(--accent); background:rgba(28,238,224,0.08); color:var(--accent); cursor:pointer; transition:all 0.2s; font-family:'Inter',Arial,sans-serif;" onmouseover="this.style.background='var(--accent)';this.style.color='#082432'" onmouseout="this.style.background='rgba(28,238,224,0.08)';this.style.color='var(--accent)'">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
              Új időpont
            </button>
          </div>
        </div>
        <!-- List View -->
        <div class="table-card" id="calendar-list-view" style="display:none;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Dátum / Idő</th>
                <th>Esemény</th>
                <th>Résztvevő</th>
                <th>Időtartam</th>
                <th>Email</th>
                <th>Státusz</th>
              </tr>
            </thead>
            <tbody id="calendar-body">
              <tr class="loading-row">
                <td colspan="6">
                  <div class="spinner"></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <!-- Grid View (FullCalendar) -->
        <div class="calendar-grid-wrapper" id="calendar-grid-view">
          <div id="fullcalendar-el"></div>
        </div>

        <!-- New Event Modal -->
        <div id="new-event-modal" style="display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
          <div class="login-card" style="width:480px; max-width:90vw;">
            <h3 style="margin-bottom:20px; font-size:18px; font-weight:700;">📅 Új időpont létrehozása</h3>
            <div style="display:flex; flex-direction:column; gap:14px;">
              <div>
                <label class="tt-label">Ügyfél neve *</label>
                <input type="text" id="event-attendee" class="tt-input" placeholder="pl. Kovács Anna">
              </div>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div>
                  <label class="tt-label">Email</label>
                  <input type="email" id="event-email" class="tt-input" placeholder="anna@example.com">
                </div>
                <div>
                  <label class="tt-label">Telefonszám</label>
                  <input type="tel" id="event-phone" class="tt-input" placeholder="+36 30 123 4567">
                </div>
              </div>
              <div>
                <label class="tt-label">Esemény címe *</label>
                <input type="text" id="event-title" class="tt-input" placeholder="pl. Konzultáció">
              </div>
              <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
                <div>
                  <label class="tt-label">Dátum *</label>
                  <input type="date" id="event-date" class="tt-input">
                </div>
                <div>
                  <label class="tt-label">Időpont *</label>
                  <input type="time" id="event-time" class="tt-input" value="09:00">
                </div>
                <div>
                  <label class="tt-label">Időtartam (perc)</label>
                  <input type="number" id="event-duration" class="tt-input" value="30" min="5" step="5">
                </div>
              </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:24px;">
              <button class="btn-primary" onclick="closeNewEventModal()" style="background:var(--bg3);color:var(--text);flex:1;">Mégse</button>
              <button class="btn-primary" onclick="submitNewEvent()" style="flex:1;">Létrehozás</button>
            </div>
          </div>
        </div>

      </div>
