    <!-- [HTML-SECTION: main] START -- Main content area with all pages -->
    <!-- Main content -->
    <main class="main">
    <!-- Greeting bar -->
    <div id="greeting-bar" style="padding:0 32px 6px 32px;">
      <div id="greeting-text" style="font-size:14px; color:var(--text);">Szia, <strong>Admin</strong>!</div>
      <div id="greeting-date" style="font-size:12px; color:var(--text-muted); margin-top:1px;"></div>
    </div>
    <!-- ÉRTESÍTÉSI HARANG ÉS TOAST KONTÉNER (SÜRGŐS ESETEK) -->
    <div id="urgent-bell-wrapper" style="position:fixed; top:24px; right:32px; z-index:100; display:flex; flex-direction:column; align-items:flex-end;">
      <div id="urgent-bell-container" title="Értesítési központ" onclick="toggleUrgentDropdown()" style="position:relative; cursor:pointer; background:var(--bg3); border:1px solid var(--border); border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 6px -1px rgba(0,0,0,0.1); transition:all 0.2s;">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="20" height="20" style="color:var(--text);"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      <span id="urgent-badge" style="display:none; position:absolute; top:-4px; right:-4px; background:#ef4444; color:white; border-radius:50%; width:20px; height:20px; font-size:11px; font-weight:bold; align-items:center; justify-content:center; box-shadow:0 2px 4px rgba(239,68,68,0.3);">0</span>
      </div>
      <div id="urgent-dropdown" style="display:none; position:absolute; top:54px; right:0; width:360px; background:var(--bg3); border:1px solid var(--border); border-radius:12px; box-shadow:0 12px 30px -3px rgba(0,0,0,0.12); max-height:480px; overflow-y:auto; flex-direction:column;">
        <div style="padding:12px 16px; border-bottom:1px solid var(--border); font-weight:600; font-size:14px; color:var(--text);">Értesítési központ</div>
        <div id="urgent-dropdown-list" style="display:flex; flex-direction:column;">
          <!-- List items will be injected here -->
        </div>
      </div>
    </div>
    <div id="urgent-toast-container" style="position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:12px; pointer-events:none;"></div>
