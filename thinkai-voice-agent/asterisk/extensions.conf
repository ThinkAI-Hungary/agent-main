[general]
static=yes

[from-telefonalo]
exten => s,1,Set(CALLID=${UNIQUEID})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Set(GLOBAL(HELD_${CALLID})=${CHANNEL})
 same => n,System(python3 /opt/lk_trigger.py ${CALLID} "${CALLERID(num)}" > /tmp/lk_${CALLID}.log 2>&1 &)
 same => n,MusicOnHold(default,m)
 same => n,Hangup()

exten => _+X.,1,Goto(from-telefonalo,s,1)
exten => _X.,1,Goto(from-telefonalo,s,1)
exten => h,1,NoOp(Hivas vege)

[from-livekit]
exten => _lkcb-.,1,Set(CALLID=${EXTEN:5})
 same => n,Answer()
 same => n,Bridge(${GLOBAL(HELD_${CALLID})})
 same => n,Hangup()
